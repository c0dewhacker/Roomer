services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-roomer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roomer}
      POSTGRES_DB: ${POSTGRES_DB:-roomer}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roomer"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # ── Application ───────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-roomer}:${POSTGRES_PASSWORD:-roomer}@postgres:5432/${POSTGRES_DB:-roomer}
      # Generate a strong secret: openssl rand -hex 32
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      PORT: "3001"
      HOST: "0.0.0.0"
      CORS_ORIGIN: ${APP_ORIGIN:-http://localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      TRUST_PROXY: "true"
      # Set to true to seed demo buildings, floors, zones, desks and a test user.
      # The admin user (admin@roomer.local / admin123) is always seeded regardless.
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      FILE_STORAGE_PATH: /app/uploads
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      EMAIL_FROM: ${EMAIL_FROM:-noreply@roomer.local}
      APP_URL: ${APP_ORIGIN:-http://localhost}
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Points nginx to the API service by its docker-compose service name
      API_URL: http://api:3001
    ports:
      - "${WEB_PORT:-8999}:80"

volumes:
  postgres_data:
  uploads_data:
