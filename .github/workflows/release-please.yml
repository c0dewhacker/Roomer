name: Release Please

# Opens/updates a "Release PR" whenever conventional commits land on main.
# Merging the Release PR creates the GitHub Release and pushes the version tag,
# which in turn triggers the Docker workflow.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
